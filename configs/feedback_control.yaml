robot: catheter_ablation.yaml

scenes:
# Scene 0: free-space PID control to a fixed target
- objects: []
  # initial_config:
  #   base_pose: [0, 0, 0, 0, 0, 0, 1]
  #   strain_coords: [...]

control:
  mode: position                 # position | pose
  sensor: em_coils              # which sensor type to control (mri_coils or em_coils)
  sensor_index: -1               # index into sensor's frame_indices array (-1 = last)

model:
  observer: ukf              # none | ekf | ukf | gru
  model_dir: state_estimation/training/learned_libraries/latent
  data_stem: full_control_tip_old
  model_prefix: structured
  dynamics_model: structured_full_control_tip_old.npz
  # Q and R are loaded from model npz files if available.
  # Fallback scalars when not saved in files:
  process_noise: 0.01
  # Per-component Q floor for base states: [ins, cos, sin, ins_vel, rot_vel]
  process_noise_base_floor: [0, 1.0e-3, 1.0e-3, 0, 1.0e-3]
  measurement_noise: 0.1
  initial_cov: 1.0

controller:
  type: mppi                # pid | open_loop | mppi | adapj
  params:
    # --- PID params ---
    # Kp: [1.0, 0.5, 0.2]
    Ki: 0.0
    # Kd: [0.1, 0.05, 0.05]
    anti_windup: 0.01

    # --- IT-MPC params (requires observer with dynamics model) ---
    horizon: 40
    n_samples: 2048
    temperature: 0.001
    alpha: 0.0               # 0=all exploit (smooth), 1=all explore (aggressive)
    # noise_std: defaults to max_rate from robot config
    terminal_weight: 1.0
    discount: 1.0             # per-step geometric discount (1.0=uniform, <1 myopic)
    smoothing_window: 5       # Savitzky-Golay window (odd, 0=disable)
    smoothing_order: 2        # SG polynomial order

    # --- AdapJ params ---
    n_state: 3
    max_delta: 0.1
    rho: 1.0
    angular_indices: [1]                  # joints with angular values (deg), encoded as cos/sin internally
    babble_steps: 100
    babble_max_rate: [0.005, 30.0, 8.0]  # max per-step change [insertion_m, rotation_deg, cable_N]

reference:
  # type: fixed                # fixed | waypoints | file
  # target: [0.02, 0.02, 0.06]  # tip xyz position (meters)

  type: circle
  center: [0.0, 0.0, 0.05]
  radius: 0.02
  plane: "xy"
  duration: 70.0

  # type: rectangle
  # center: [0.0, 0.0, 0.05]
  # width: 0.02
  # height: 0.02
  # plane: "xy"
  # duration: 100.0

  # type: waypoints
  # waypoints:
  #   - {t: 0.0, target: [0.0, 0.0, 0.12]}
  #   - {t: 10.0, target: [0.01, 0.0, 0.13]}
  #   - {t: 20.0, target: [0.0, 0.0, 0.12]}

  # type: file
  # path: reference_trajectory.npy

output:
  record: false               # set to false to skip H5 recording
  dir: ./feedback_data
  warmup_steps: 200

visualization:
  show_estimated_shape: true    # render ghost catheter shape
  shape_source: observer        # observer | rollout (autoregressive dynamics)

simulation:
  duration: 100.0
  dt: 0.01
  control_rate: 10            # run controller every N sim steps
