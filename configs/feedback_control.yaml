robot: catheter_ablation.yaml

scenes:
# Scene 0: free-space PID control to a fixed target
- objects: []
  # initial_config:
  #   base_pose: [0, 0, 0, 0, 0, 0, 1]
  #   strain_coords: [...]

control:
  mode: position                 # position | pose
  sensor: em_coils              # which sensor type to control (mri_coils or em_coils)
  sensor_index: -1               # index into sensor's frame_indices array (-1 = last)

model:
  observer: ukf              # none | ekf | ukf | gru
  model_dir: state_estimation/training/learned_libraries/latent
  data_stem: full_control_tip
  dynamics_model: mlp_full_control_tip.npz
  # Q and R are loaded from model npz files if available.
  # Fallback scalars when not saved in files:
  process_noise: 0.01
  measurement_noise: 0.1
  initial_cov: 1.0

controller:
  type: mppi                # pid | open_loop | mppi | adapj
  params:
    # --- PID params ---
    # Kp: [1.0, 0.5, 0.2]
    # Ki: [0.01, 0.01, 0.0]
    # Kd: [0.1, 0.05, 0.05]
    # anti_windup: 100.0

    # --- MPPI params (requires observer with dynamics model) ---
    horizon: 10
    n_samples: 100
    temperature: 1.0
    noise_std: [5.0, 10.0, 1.0]
    terminal_weight: 10.0

    # --- AdapJ params ---
    # n_state: 3
    # max_delta: 0.1
    # rho: 1.0
    # angular_indices: [1]                  # joints with angular values (deg), encoded as cos/sin internally
    # babble_steps: 100
    # babble_amplitude: [10.0, 30.0, 5.0]  # [insertion_mm, rotation_deg, cable]

reference:
  type: fixed                # fixed | waypoints | file
  target: [0.0, 0.02, 0.06]  # tip xyz position (meters)
  # type: waypoints
  # waypoints:
  #   - {t: 0.0, target: [0.0, 0.0, 0.12]}
  #   - {t: 10.0, target: [0.01, 0.0, 0.13]}
  #   - {t: 20.0, target: [0.0, 0.0, 0.12]}
  # type: file
  # path: reference_trajectory.npy

output:
  record: false               # set to false to skip H5 recording
  dir: ./feedback_data
  warmup_steps: 0

simulation:
  duration: 30.0
  dt: 0.01
  control_rate: 10            # run controller every N sim steps
